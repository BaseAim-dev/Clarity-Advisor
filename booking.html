  <style>
    .booking-page {
      min-height: 100vh;
      background: var(--col-bg);
      display: flex;
      flex-direction: column;
    }

    .booking-header {
      padding: 20px var(--gutter);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .booking-header .logo-img { height: 52px; }

    .booking-body {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px var(--gutter) 80px;
    }

    .booking-card {
      background: var(--col-bg-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
    }

    .booking-widget {
      padding: 32px 40px;
    }

    @media (max-width: 680px) {
      .booking-widget { padding: 24px 12px; }
    }
  </style>
</head>
<body class="booking-page">

  <header class="booking-header">
    <a href="/">
      <img src="assets/images/logo-upscaled.png" alt="Clarity Advisor" class="logo-img" />
    </a>
  </header>

  <main class="booking-body">
    <div class="booking-card">

      <div class="booking-widget">
        <iframe src="https://crm.clarityadvisor.au/widget/booking/O4sOXXeLuFvCYic2BkXA" style="width:100%;border:none;overflow:hidden;" scrolling="no" id="O4sOXXeLuFvCYic2BkXA_1781946906827"></iframe>
        <script src="https://crm.clarityadvisor.au/js/form_embed.js" type="text/javascript"></script>
      </div>
      <script>
        (function () {
          var p = new URLSearchParams(window.location.search);
          var name  = p.get('name')  || '';
          var email = p.get('email') || '';
          var phone = p.get('phone') || '';
          if (!email && !name) return;

          var nameParts = name.trim().split(/\s+/);
          var firstName = nameParts[0] || '';
          var lastName  = nameParts.slice(1).join(' ') || '';

          var iframe = document.getElementById('O4sOXXeLuFvCYic2BkXA_1781946906827');
          var base   = 'https://crm.clarityadvisor.au/widget/booking/O4sOXXeLuFvCYic2BkXA';
          var params = new URLSearchParams({
            first_name:   firstName,
            last_name:    lastName,
            email:        email,
            phone:        phone,
            phone_number: phone,
            phoneNumber:  phone,
          });
          iframe.src = base + '?' + params.toString();
        })();
      </script>

    </div>
  </main>

  <!-- Vercel Speed Insights -->
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
