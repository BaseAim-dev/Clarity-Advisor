<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Your Free Review — Clarity Advisor</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .booking-page {
      min-height: 100vh;
      background: var(--col-bg);
      display: flex;
      flex-direction: column;
    }

    .booking-header {
      padding: 20px var(--gutter);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .booking-header .logo-img { height: 52px; }

    .booking-body {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px var(--gutter) 80px;
    }

    .booking-card {
      background: var(--col-bg-card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
    }

    .booking-widget {
      padding: 32px 40px;
    }

    @media (max-width: 680px) {
      .booking-widget { padding: 24px 12px; }
    }
  </style>
</head>
<body class="booking-page">

  <header class="booking-header">
    <a href="index.html">
      <img src="assets/images/logo-upscaled.png" alt="Clarity Advisor" class="logo-img" />
    </a>
  </header>

  <main class="booking-body">
    <div class="booking-card">

      <div class="booking-widget">
        <iframe src="https://crm.clarityadvisor.au/widget/booking/O4sOXXeLuFvCYic2BkXA" style="width:100%;border:none;overflow:hidden;" scrolling="no" id="O4sOXXeLuFvCYic2BkXA_1781946906827"></iframe>
        <script src="https://crm.clarityadvisor.au/js/form_embed.js" type="text/javascript"></script>
      </div>

    </div>
  </main>

</body>
</html>
